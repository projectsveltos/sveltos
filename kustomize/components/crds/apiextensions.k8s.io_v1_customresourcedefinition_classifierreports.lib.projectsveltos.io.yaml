apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: classifierreports.lib.projectsveltos.io
spec:
  group: lib.projectsveltos.io
  names:
    kind: ClassifierReport
    listKind: ClassifierReportList
    plural: classifierreports
    singular: classifierreport
  scope: Namespaced
  versions:
  - name: v1beta1
    schema:
      openAPIV3Schema:
        description: ClassifierReport is the Schema for the classifierreports API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              classifierName:
                description: |-
                  ClassifierName is the name of the Classifier instance this report
                  is for.
                type: string
              clusterName:
                description: |-
                  ClusterName is the name of the Cluster this ClusterReport
                  is for.
                type: string
              clusterNamespace:
                description: |-
                  ClusterNamespace is the namespace of the Cluster this
                  ClusterReport is for.
                type: string
              clusterType:
                description: ClusterType is the type of Cluster
                type: string
              match:
                description: |-
                  Match indicates whether Cluster is currently a match for
                  the Classifier instance this report is for
                type: boolean
            required:
            - classifierName
            - clusterName
            - clusterNamespace
            - clusterType
            - match
            type: object
          status:
            description: ClassifierReportStatus defines the observed state of ClassifierReport
            properties:
              deploymentStatus:
                description: DeploymentStatus is the current deployment status of
                  the Classifier on the cluster.
                enum:
                - Provisioning
                - Provisioned
                - Failed
                - FailedNonRetriable
                - Removing
                - Removed
                type: string
              failureMessage:
                description: FailureMessage provides more information when DeploymentStatus
                  is Failed.
                type: string
              hash:
                description: Hash is the hash of the Classifier that was last successfully
                  deployed to the cluster.
                format: byte
                type: string
              managedLabels:
                description: ManagedLabels lists the labels this Classifier instance
                  is managing on the cluster.
                items:
                  type: string
                type: array
              phase:
                description: Phase represents the current phase of report.
                enum:
                - WaitingForDelivery
                - Delivering
                - Processed
                type: string
              unmanagedLabels:
                description: |-
                  UnManagedLabels lists labels this Classifier instance would like to manage but cannot
                  because a different Classifier instance is already managing them.
                items:
                  properties:
                    failureMessage:
                      description: |-
                        FailureMessage is a human consumable message explaining the
                        misconfiguration
                      type: string
                    key:
                      description: |-
                        Key represents a label Classifier would like to manage
                        but cannot because currently managed by different instance
                      type: string
                  required:
                  - key
                  type: object
                type: array
            type: object
