apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: managementclusterclassifierreports.lib.projectsveltos.io
spec:
  group: lib.projectsveltos.io
  names:
    kind: ManagementClusterClassifierReport
    listKind: ManagementClusterClassifierReportList
    plural: managementclusterclassifierreports
    singular: managementclusterclassifierreport
  scope: Namespaced
  versions:
  - name: v1beta1
    schema:
      openAPIV3Schema:
        description: |-
          ManagementClusterClassifierReport is created by the ManagementClusterClassifier
          controller — one per (ManagementClusterClassifier, cluster) pair — to track which
          labels are managed on each cluster and to enable conflict detection via the keymanager.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ManagementClusterClassifierReportSpec identifies the classifier and cluster this
              report belongs to.
            properties:
              classifierName:
                description: ClassifierName is the name of the ManagementClusterClassifier
                  this report is for.
                type: string
              clusterName:
                description: ClusterName is the name of the cluster this report is
                  for.
                type: string
              clusterNamespace:
                description: ClusterNamespace is the namespace of the cluster this
                  report is for.
                type: string
              clusterType:
                description: ClusterType is the type of the cluster this report is
                  for.
                type: string
            required:
            - classifierName
            - clusterName
            - clusterNamespace
            - clusterType
            type: object
          status:
            description: ManagementClusterClassifierReportStatus is written by the
              controller after processing.
            properties:
              managedLabels:
                description: |-
                  ManagedLabels lists the label keys this ManagementClusterClassifier is
                  actively managing on the cluster.
                items:
                  type: string
                type: array
              unmanagedLabels:
                description: |-
                  UnManagedLabels lists label keys this ManagementClusterClassifier would like
                  to manage but cannot because another Classifier or ManagementClusterClassifier
                  already owns them.
                items:
                  properties:
                    failureMessage:
                      description: |-
                        FailureMessage is a human consumable message explaining the
                        misconfiguration
                      type: string
                    key:
                      description: |-
                        Key represents a label Classifier would like to manage
                        but cannot because currently managed by different instance
                      type: string
                  required:
                  - key
                  type: object
                type: array
            type: object
